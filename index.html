<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LigAfric Agriculture</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

header{
background:#0b7d3b;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:8px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.card:hover{
background:#e8ffe8;
}

button{
padding:12px 20px;
background:#0b7d3b;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

.page{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<header>

<h1>LigAfric Agriculture</h1>

</header>

<div class="container">

<div id="home" class="page active">

<h2>Select Module</h2>

<div class="card" onclick="openPage('registration')">

<h3>🌾 Farmer Registration</h3>

<p>Register as a farmer.</p>

</div>

<div class="card">

<h3>🛒 Marketplace</h3>

<p>Coming Soon</p>

</div>

<div class="card">

<h3>🚚 Logistics</h3>

<p>Coming Soon</p>

</div>

</div>

<div id="registration" class="page">

<h2>Farmer Registration</h2>

<form id="farmerForm">

<label>Full Name</label>

<input type="text" required>

<label>National ID</label>

<input type="text">

<label>Phone Number</label>

<input type="tel">

<label>Email</label>

<input type="email">

<label>County</label>

<input type="text">

<label>Sub County</label>

<input type="text">

<label>Ward</label>

<input type="text">

<label>Village</label>

<input type="text">

<label>Farm Size (Acres)</label>

<input type="number">

<label>Main Crop</label>

<select>

<option>Maize</option>

<option>Beans</option>

<option>Coffee</option>

<option>Tea</option>

<option>Rice</option>

<option>Vegetables</option>

</select>

<label>Livestock</label>

<textarea></textarea>

<button type="submit">Register Farmer</button>

</form>

<br>

<button onclick="goHome()">Back</button>

</div>

</div>

<script>

function openPage(page){

document.querySelectorAll(".page").forEach(p=>{

p.classList.remove("active");

});

document.getElementById(page).classList.add("active");

}

function goHome(){

openPage("home");

}

document.getElementById("farmerForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Farmer Registered Successfully!");

});

</script>

</body>

</html>
